<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — LMS</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Background blobs -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="login-wrapper">
        <div class="login-box">

            <div class="login-logo">
                <h1>⚡ EduLMS</h1>
                <p>Create your student account</p>
            </div>

            <!-- Error message -->
            <div id="error-msg" class="error-msg hidden"></div>

            <!-- Full Name -->
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="e.g. Ahmed Mohamed" autocomplete="off" />
            </div>

            <!-- Username -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a unique username" autocomplete="off" />
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength()" />
                    <button class="toggle-password" onclick="togglePassword('password')" type="button">👁</button>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strength-fill"></div>
                </div>
                <div class="strength-text" id="strength-text"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Re-enter your password" />
                    <button class="toggle-password" onclick="togglePassword('confirm-password')" type="button">👁</button>
                </div>
            </div>

            <button class="login-btn" onclick="register()">Create Account →</button>

            <div class="switch-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>

        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
